# Reusable WoW addon validation workflow.
#
# DEPLOY: copy this to  peavers-warcraft/workflow-templates/.github/workflows/validate.yml
# Each addon calls it from its own .github/workflows/validate.yml (see validate.caller.yml).
#
# Runs the two-tier static analysis (luacheck existence + lua-language-server signatures)
# against the shared wow-api defs and posts findings as inline PR comments via reviewdog.
# Errors fail the check; warnings annotate only (fail_level: error).
name: Validate

on:
  workflow_call:
    inputs:
      wow_api_ref:
        description: Branch/tag of peavers-warcraft/wow-api to validate against
        type: string
        default: master
      check_level:
        description: "lua-language-server level: Error | Warning | Hint"
        type: string
        default: Warning
      fail_level:
        description: "reviewdog -fail-level: error | any (any = warnings block too)"
        type: string
        default: error

permissions:
  contents: read
  pull-requests: write   # reviewdog posts inline review comments
  checks: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout addon
        uses: actions/checkout@v4
        with:
          path: addon

      - name: Checkout wow-api defs
        uses: actions/checkout@v4
        with:
          repository: peavers-warcraft/wow-api
          ref: ${{ inputs.wow_api_ref }}
          path: wow-api

      - name: Install luacheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lua5.1 luarocks
          sudo luarocks install luacheck

      - name: Install lua-language-server
        run: |
          VER=$(curl -fsSL https://api.github.com/repos/LuaLS/lua-language-server/releases/latest | grep -oP '"tag_name":\s*"\K[^"]+')
          curl -fsSL -o luals.tar.gz \
            "https://github.com/LuaLS/lua-language-server/releases/download/${VER}/lua-language-server-${VER}-linux-x64.tar.gz"
          mkdir -p "$HOME/.luals" && tar -xzf luals.tar.gz -C "$HOME/.luals"
          echo "$HOME/.luals/bin" >> "$GITHUB_PATH"

      - name: Setup reviewdog
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      - name: Validate
        working-directory: addon
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REVIEWDOG_REPORTER: github-pr-review
          WOW_API_DIR: ${{ github.workspace }}/wow-api
          CHECK_LEVEL: ${{ inputs.check_level }}
          FAIL_LEVEL: ${{ inputs.fail_level }}
        run: |
          # wow-api is a sibling of addon in the workspace, so ../wow-api (used by the
          # addon's .luarc.json) resolves correctly; WOW_API_DIR covers the luacheck side.
          ../wow-api/ci/run-validation.sh
